<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheDesk - 4 Sites Live Comparison (Lakhs Products)</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI',sans-serif; background: linear-gradient(135deg,#1e3c72 0%,#2a5298 100%); min-height:100vh; }
        .container { max-width:1400px; margin:0 auto; padding:20px; }
        .header { text-align:center; color:white; margin-bottom:40px; }
        .header h1 { font-size:3.5em; margin-bottom:10px; text-shadow:3px 3px 6px rgba(0,0,0,0.5); }
        .search-box { width:100%; max-width:700px; margin:0 auto 30px; display:block; padding:20px 30px; font-size:1.3em; border:3px solid rgba(255,255,255,0.3); border-radius:50px; background:rgba(255,255,255,0.1); color:white; backdrop-filter:blur(10px); text-align:center; }
        .search-box::placeholder { color:rgba(255,255,255,0.7); }
        .stats-bar { display:flex; justify-content:center; gap:40px; color:white; margin-bottom:40px; font-size:1.2em; background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; backdrop-filter:blur(10px); }
        .site-tabs { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:30px; }
        .site-tab { padding:12px 25px; background:rgba(255,255,255,0.2); color:white; border-radius:30px; cursor:pointer; transition:all 0.3s; border:2px solid transparent; }
        .site-tab.active { background:white; color:#1e3c72; border-color:#ff6b6b; box-shadow:0 10px 30px rgba(255,107,107,0.4); }
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:25px; }
        .product-card { background:white; border-radius:25px; padding:25px; box-shadow:0 20px 60px rgba(0,0,0,0.15); transition:all 0.4s; position:relative; overflow:hidden; }
        .product-card:hover { transform:translateY(-15px) scale(1.02); box-shadow:0 30px 80px rgba(0,0,0,0.25); }
        .product-image { width:100%; height:240px; object-fit:cover; border-radius:20px; margin-bottom:20px; }
        .product-title { font-size:1.2em; color:#333; line-height:1.5; margin-bottom:15px; height:3.6em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; font-weight:600; }
        .price-section { margin:20px 0; }
        .live-price { font-size:2.8em; font-weight:800; background:linear-gradient(45deg,#ff416c,#ff4b2b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
        .site-badge { display:inline-block; padding:8px 20px; color:white; border-radius:25px; font-weight:bold; font-size:0.9em; margin:5px 0; }
        .amazon-badge { background:linear-gradient(45deg,#ff9900,#ffaa33); }
        .flipkart-badge { background:linear-gradient(45deg,#2874f0,#3399ff); }
        .meesho-badge { background:linear-gradient(45deg,#ff6b9d,#ff8ba7); }
        .myntra-badge { background:linear-gradient(45deg,#fc4a1a,#f7b733); }
        .btn { display:inline-block; padding:14px 28px; color:white; text-decoration:none; border-radius:30px; font-weight:700; margin:8px 4px 0 0; transition:all 0.3s; box-shadow:0 8px 25px rgba(0,0,0,0.2); }
        .btn-amazon { background:linear-gradient(45deg,#ff9900,#ffaa33); }
        .btn-flipkart { background:linear-gradient(45deg,#2874f0,#3399ff); }
        .btn-whatsapp { background:linear-gradient(45deg,#25d366,#128c7e); font-size:1.1em; }
        .loading { text-align:center; grid-column:1/-1; color:white; font-size:2em; padding:60px; }
        .no-results { text-align:center; color:white; font-size:1.8em; grid-column:1/-1; padding:80px; background:rgba(255,255,255,0.1); border-radius:20px; }
        .whatsapp-float { position:fixed; bottom:25px; right:25px; width:70px; height:70px; border-radius:50%; background:linear-gradient(45deg,#25d366,#128c7e); display:flex; align-items:center; justify-content:center; font-size:2.2em; color:white; z-index:1000; box-shadow:0 10px 40px rgba(37,211,102,0.4); }
        @media (max-width:768px) { .stats-bar { flex-direction:column; gap:20px; } .products-grid { grid-template-columns:1fr; } .header h1 { font-size:2.5em; } }
    </style>
</head>
<body>
    <a href="https://wa.me/919812837279" class="whatsapp-float" target="_blank">💬</a>
    
    <div class="container">
        <div class="header">
            <h1>🔥 TheDesk - 4 Sites Live Sync</h1>
            <p>Amazon + Flipkart + Meesho + Myntra | लाखों Products | Live Comparison</p>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 iPhone, Earbuds, Laptop, Watch - कुछ भी search करो...">
        </div>

        <div class="stats-bar">
            <div>📦 <span id="totalProducts">0</span> Products Loaded</div>
            <div>⚡ <span id="liveSyncs">0</span> Live Updates</div>
            <div>💰 <span id="lowestPrices">₹0</span> Cheapest Found</div>
            <div>🌐 <span id="activeSite">All</span> Active</div>
        </div>

        <div class="site-tabs" id="siteTabs">
            <div class="site-tab active" data-site="all">All Sites</div>
            <div class="site-tab" data-site="amazon">Amazon</div>
            <div class="site-tab" data-site="flipkart">Flipkart</div>
            <div class="site-tab" data-site="meesho">Meesho</div>
            <div class="site-tab" data-site="myntra">Myntra</div>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="loading">🚀 Loading Lakhs of Products... (5 sec)</div>
        </div>
    </div>

    <script>
        // 🔥 4 SITES - FULL LIVE DATA SYSTEM
        const API_ENDPOINTS = {
            amazon: 'https://theedesk.onrender.com/api/amazon/in/search/',
            flipkart: 'https://theedesk.onrender.com/api/flipkart/search/',
            meesho: 'https://theedesk.onrender.com/api/meesho/search/',
            myntra: 'https://theedesk.onrender.com/api/myntra/search/'
        };

        let allProducts = [];
        let liveSyncCount = 0;
        let currentFilter = 'all';

        // Popular search keywords (लाखों products के लिए)
        const popularKeywords = [
            'iphone', 'samsung', 'oneplus', 'realme', 'poco', 'vivo', 'oppo', 'xiaomi',
            'airpods', 'boat earbuds', 'noise buds', 'smartwatch', 'apple watch',
            'laptop', 'macbook', 'ipad', 'powerbank', 'charger', 'headphones',
            'bluetooth speaker', 'neckband', 'tws earbuds', 'gaming mouse'
        ];

        // Fetch LIVE data from ALL 4 sites
        async function fetchSiteData(site, query) {
            try {
                const response = await fetch(`${API_ENDPOINTS[site]}${encodeURIComponent(query)}`);
                const data = await response.json();
                
                return (data || []).map(product => ({
                    ...product,
                    site: site.toUpperCase(),
                    siteColor: site === 'amazon' ? '#ff9900' : 
                              site === 'flipkart' ? '#2874f0' : 
                              site === 'meesho' ? '#ff6b9d' : '#fc4a1a',
                    badgeClass: site === 'amazon' ? 'amazon-badge' : 
                               site === 'flipkart' ? 'flipkart-badge' : 
                               site === 'meesho' ? 'meesho-badge' : 'myntra-badge'
                }));
            } catch (error) {
                console.log(`❌ ${site} API failed:`, error);
                return [];
            }
        }

        // Fetch ALL 4 sites parallel (Super Fast)
        async function fetchAllSites(query) {
            const sitePromises = Object.keys(API_ENDPOINTS).map(site => 
                fetchSiteData(site, query)
            );
            
            const allResults = await Promise.allSettled(sitePromises);
            const validResults = allResults
                .filter(result => result.status === 'fulfilled')
                .map(result => result.value)
                .flat();

            return validResults;
        }

        // Create product card (4-site comparison ready)
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image || 'https://via.placeholder.com/340x240/2a5298/ffffff?text=COD+Ready'}" 
                     alt="${product.title}" class="product-image" 
                     onerror="this.src='https://via.placeholder.com/340x240/ff416c/ffffff?text=${product.site}'">
                
                <div class="product-title">${product.title || 'Amazing Deal'}</div>
                
                <div class="price-section">
                    <div class="live-price">${product.price ? `₹${product.price.toLocaleString()}` : '₹9,999'}</div>
                    <span class="site-badge ${product.badgeClass}">${product.site}</span>
                </div>
                
                <div>
                    <a href="${product.url || '#'}" class="btn btn-${product.site.toLowerCase()}" target="_blank">
                        🛒 Buy ${product.site}
                    </a>
                    <a href="https://wa.me/919812837279?text=Hi!%20मुझे%20${encodeURIComponent((product.title || '').slice(0,60))}%20चाहिए%20${product.price ? '₹' + product.price : 'best price'}%20में.%20COD%20कर%20दो!" 
                       class="btn btn-whatsapp" target="_blank">
                        💬 COD Order
                    </a>
                </div>
            `;
            return card;
        }

        // Display products with filter
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            const totalProductsEl = document.getElementById('totalProducts');
            const lowestPriceEl = document.getElementById('lowestPrices');
            
            grid.innerHTML = '';

            if (!products.length) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size:3em; margin-bottom:20px;">🔍</div>
                        Try: iPhone, Earbuds, Laptop, Smartwatch, Charger
                    </div>
                `;
                return;
            }

            // Sort by price (lowest first)
            const sortedProducts = products.sort((a, b) => {
                const priceA = parseFloat(a.price || 9999);
                const priceB = parseFloat(b.price || 9999);
                return priceA - priceB;
            });

            sortedProducts.slice(0, 48).forEach(product => {
                grid.appendChild(createProductCard(product));
            });

            totalProductsEl.textContent = products.length.toLocaleString();
            lowestPriceEl.textContent = `₹${sortedProducts[0]?.price?.toLocaleString() || '0'}`;
        }

        // Site tabs filter
        document.getElementById('siteTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('site-tab')) {
                document.querySelectorAll('.site-tab').forEach(tab => tab.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.site;
                filterAndDisplay();
            }
        });

        // LIVE Search (Real-time)
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            if (query.length < 2) {
                // Auto popular search
                const randomKeyword = popularKeywords[Math.floor(Math.random() * popularKeywords.length)];
                document.getElementById('searchInput').placeholder = `🔍 Try: ${randomKeyword}`;
                filterAndDisplay();
                return;
            }

            document.getElementById('productsGrid').innerHTML = '<div class="loading">🔍 Searching ${query} in 4 sites...</div>';
            
            const freshProducts = await fetchAllSites(query);
            allProducts = [...allProducts, ...freshProducts];
            filterAndDisplay(freshProducts);
        });

        // Filter by site
        function filterAndDisplay(freshData = null) {
            const productsToShow = freshData || allProducts;
            const filtered = currentFilter === 'all' ? 
                productsToShow : 
                productsToShow.filter(p => p.site.toLowerCase() === currentFilter);
            
            displayProducts(filtered);
        }

        // LIVE AUTO SYNC (Every 90 seconds)
        async function liveSync() {
            try {
                const query = document.getElementById('searchInput').value || 'smartphone';
                const newProducts = await fetchAllSites(query);
                
                allProducts = [...allProducts, ...newProducts];
                liveSyncCount++;
                
                document.getElementById('liveSyncs').textContent = liveSyncCount;
                document.getElementById('activeSite').textContent = 'All 4';
                
                filterAndDisplay(newProducts);
            } catch (error) {
                console.log('Live sync error:', error);
            }
        }

        // START - Initial load + Auto sync
        window.addEventListener('load', async () => {
            // Load popular products first
            const initialProducts = await fetchAllSites('smartphone');
            allProducts = initialProducts;
            displayProducts(initialProducts);
            
            // Auto sync every 90 seconds
            setInterval(liveSync, 90000);
            
            // Instant search on enter
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = e.target.value.trim();
                    if (query) fetchAllSites(query).then(filterAndDisplay);
                }
            });
        });
    </script>
</body>
</html>
