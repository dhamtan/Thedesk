<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheDesk | Pro AI Shopping Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f97316 100%); }
        .gold-text { color: #d4af37; }
        .card-shadow { background: #111; border: 1px solid rgba(212, 175, 55, 0.1); transition: 0.3s; }
        .card-shadow:hover { border: 1px solid #f97316; transform: translateY(-5px); }
        .loader { border-top-color: #f97316; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="p-5 border-b border-gray-900 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-desktop text-white"></i>
                </div>
                <h1 class="text-xl font-bold gold-text">TheDesk</h1>
            </div>
            <div class="text-[10px] bg-green-500/10 text-green-400 px-3 py-1 rounded-full border border-green-500/20">
                <i class="fas fa-bolt mr-1"></i> API SYNC ACTIVE
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-3xl mx-auto mb-16">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search premium study gear..." 
                       class="w-full bg-white/5 border border-orange-500/30 rounded-2xl py-5 px-8 outline-none focus:ring-2 focus:ring-orange-500 text-lg shadow-2xl">
                <button onclick="handleSearch()" class="absolute right-2 top-2 gold-gradient h-12 w-12 rounded-xl text-white">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="mt-20 border-t border-gray-900 bg-black py-12 px-6">
        <div class="container mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <h3 class="gold-text font-bold mb-4">About TheDesk</h3>
                <p class="text-xs text-gray-500 leading-loose">TheDesk is an AI-powered comparison engine for students and professionals. Contact: Vvvppp0@yahoo.com</p>
            </div>
            <div class="text-right text-[10px] text-gray-700">
                <p>As an Amazon Associate, we earn from qualifying purchases through thedesk-21.</p>
            </div>
        </div>
    </footer>

    <script>
        // --- API KEY CONFIGURATION ---
        const RAPID_API_KEY = '28aa82e52fmsh464c33cf7943371p1d0d4fjsn5d28d22889c'; //
        const GEMINI_API_KEY = 'AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE'; //
        const AMAZON_TAG = 'thedesk-21'; //

        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            
            setLoading(true);
            try {
                // Fetching via RapidAPI Amazon Engine
                const response = await fetch(`https://instant-amazon-data.p.rapidapi.com/amazon-search?query=${encodeURIComponent(query)}&page=1&country=IN`, {
                    headers: {
                        'x-rapidapi-key': RAPID_API_KEY,
                        'x-rapidapi-host': 'instant-amazon-data.p.rapidapi.com'
                    }
                });
                const result = await response.json();
                renderProducts(result.data.products);
            } catch (err) {
                console.error(err);
                document.getElementById('productGrid').innerHTML = `<p class="col-span-full text-center text-red-500 italic">Error connecting to Amazon Sync. Check API limit.</p>`;
            }
            setLoading(false);
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            items.slice(0, 12).forEach(p => {
                // FIXED: Affiliate Link Injection
                const affiliateLink = `${p.product_url}${p.product_url.includes('?') ? '&' : '?'}tag=${AMAZON_TAG}`;
                grid.innerHTML += `
                    <div class="card-shadow rounded-2xl p-5 flex flex-col justify-between">
                        <div>
                            <img src="${p.product_photo}" class="w-full h-40 object-contain rounded-lg mb-4 bg-white p-2">
                            <h3 class="text-xs font-semibold mb-2 line-clamp-2">${p.product_title}</h3>
                            <p class="text-xl font-black gold-text mb-4">${p.product_price || 'Live Link'}</p>
                        </div>
                        <a href="${affiliateLink}" target="_blank" class="gold-gradient text-white text-center py-3 rounded-xl font-bold text-xs uppercase tracking-tighter">
                            Check Price on Amazon
                        </a>
                    </div>
                `;
            });
        }

        function setLoading(status) {
            if(status) document.getElementById('productGrid').innerHTML = `<div class="col-span-full flex flex-col items-center py-20"><div class="loader rounded-full border-4 h-12 w-12 mb-4"></div><p class="gold-text text-[10px] tracking-widest font-bold">AI DATA SYNCING...</p></div>`;
        }

        // Default Load
        window.onload = () => { document.getElementById('searchInput').value = 'Study Table Accessories'; handleSearch(); };
    </script>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true; s1.src='https://embed.tawk.to/69ab3610884aa31c34e83956/default';
            s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>
</body>
</html>
