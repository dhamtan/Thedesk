<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheDesk - Live Multi-Site Price Comparison</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI',sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; }
        .container { max-width:1400px; margin:0 auto; padding:20px; }
        .header { text-align:center; color:white; margin-bottom:40px; }
        .header h1 { font-size:3em; margin-bottom:10px; text-shadow:2px 2px 4px rgba(0,0,0,0.3); }
        .search-box { width:100%; max-width:600px; margin:0 auto 30px; display:block; padding:18px 25px; font-size:1.2em; border:none; border-radius:50px; box-shadow:0 15px 40px rgba(0,0,0,0.2); text-align:center; }
        .stats { display:flex; justify-content:center; gap:30px; color:white; margin-bottom:30px; font-size:1.1em; }
        .comparison-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:25px; margin:30px 0; }
        .comp-card { background:rgba(255,255,255,0.95); border-radius:20px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.1); }
        .site-logo { font-size:2em; margin-bottom:10px; }
        .price-display { font-size:3em; font-weight:bold; color:#e74c3c; margin:15px 0; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:25px; }
        .product-card { background:white; border-radius:20px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.1); transition:all 0.3s; position:relative; }
        .product-card:hover { transform:translateY(-10px); box-shadow:0 30px 60px rgba(0,0,0,0.2); }
        .product-image { width:100%; height:220px; object-fit:cover; border-radius:15px; margin-bottom:15px; }
        .product-title { font-size:1.1em; color:#333; line-height:1.4; margin-bottom:15px; height:3em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
        .lowest-price { background:linear-gradient(45deg,#00b894,#00cec9); color:white; padding:8px 15px; border-radius:25px; font-weight:bold; display:inline-block; margin:10px 0; }
        .btn { display:inline-block; padding:12px 25px; color:white; text-decoration:none; border-radius:50px; font-weight:bold; transition:all 0.3s; margin:5px; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .btn-amazon { background:linear-gradient(45deg,#ff9900,#ffaa33); }
        .btn-flipkart { background:linear-gradient(45deg,#2874f0,#3399ff); }
        .btn-whatsapp { background:linear-gradient(45deg,#25d366,#128c7e); }
        .no-results { text-align:center; color:white; font-size:1.5em; margin:50px 0; grid-column:1/-1; }
        .whatsapp-float { position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:linear-gradient(45deg,#25d366,#128c7e); display:flex; align-items:center; justify-content:center; font-size:2em; color:white; z-index:1000; }
        @media (max-width:768px) { .stats { flex-direction:column; gap:15px; text-align:center; } .comparison-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <a href="https://wa.me/919812837279" class="whatsapp-float" target="_blank">💬</a>
    
    <div class="container">
        <div class="header">
            <h1>🔥 TheDesk - Live Price Comparison</h1>
            <p>Amazon + Flipkart + Meesho + Myntra - सबसे सस्ता यहीं!</p>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 iPhone, Samsung, OnePlus या कोई भी product search करो...">
        </div>

        <div class="stats" id="stats">
            <div>🛒 <span id="totalProducts">0</span> Products</div>
            <div>⚡ <span id="liveUpdates">0</span> Live Updates</div>
            <div>💰 <span id="savings">₹0</span> Saved</div>
        </div>

        <div class="comparison-grid" id="comparisonGrid"></div>
        <div class="product-grid" id="productGrid"></div>
    </div>
    <script>
        // 🔥 UNLIMITED API SYSTEM - 4 SITES COMPARISON
        const APIs = {
            amazon: 'https://theedesk.onrender.com/api/amazon/in/search/',
            flipkart: 'https://theedesk.onrender.com/api/flipkart/search/',
            meesho: 'https://theedesk.onrender.com/api/meesho/search/',
            myntra: 'https://theedesk.onrender.com/api/myntra/search/'
        };

        // Popular keywords for unlimited products
        const popularSearches = [
            'iphone', 'samsung galaxy', 'oneplus', 'realme', 'poco', 'vivo', 'oppo', 
            'airpods', 'boat earbuds', 'smartwatch', 'laptop', 'macbook', 'ipad',
            'samsung watch', 'powerbank', 'charger', 'headphones', 'bluetooth speaker'
        ];

        let allProducts = [];
        let liveUpdateCount = 0;

        // Fetch from ALL 4 sites
        async function fetchFromAllSites(query) {
            const promises = Object.entries(APIs).map(async ([site, url]) => {
                try {
                    const response = await fetch(${url}${encodeURIComponent(query)});
                    const data = await response.json();
                    return data.map(product => ({
                        ...product,
                        site: site.toUpperCase(),
                        siteColor: site === 'amazon' ? '#ff9900' : site === 'flipkart' ? '#2874f0' : '#ff6b9d'
                    }));
                } catch {
                    return [];
                }
            });

            const results = await Promise.all(promises);
            return results.flat();
        }

        // Find lowest price
        function getLowestPrice(products) {
            const prices = products
                .filter(p => p.price && !isNaN(parseFloat(p.price.replace(/[₹,]/g, ''))))
                .map(p => parseFloat(p.price.replace(/[₹,]/g, '')));
            return prices.length ? Math.min(...prices) : null;
        }

        // Display comparison cards (TOP 4 sites)
        function showComparison(sitesData) {
            const grid = document.getElementById('comparisonGrid');
            grid.innerHTML = '';

            Object.entries(sitesData).forEach(([site, products]) => {
                if (products.length) {
                    const lowest = getLowestPrice(products);
                    const card = document.createElement('div');
                    card.className = 'comp-card';
                    card.innerHTML = 
                        <div class="site-logo" style="color:${sitesData[site][0].siteColor}">📦 ${site}</div>
                        <div class="price-display">${lowest ? ₹${lowest.toLocaleString()} : 'Loading...'}</div>
                        <div><strong>${products.length}</strong> products found</div>
                        <a href="#" class="btn" style="background:${sitesData[site][0].siteColor}44">View All</a>
                    ;
                    grid.appendChild(card);
                }
            });
        }

        // Display unlimited products
        function displayProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            if (!products.length) {
                grid.innerHTML = '<div class="no-results">🔍 अभी कोई product नहीं मिला. Different keyword try करो!</div>';
                return;
            }

            products.forEach(product => {
                const lowestPrice = getLowestPrice(allProducts.filter(p => 
                    p.title.toLowerCase().includes(product.title.toLowerCase().slice(0, 20))
                ));

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image || 'https://via.placeholder.com/300x220/e74c3c/ffffff?text=COD'}"
alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/300x220/667eea/ffffff?text=Image+Loading'">
                    <div class="product-title">${product.title}</div>
                    <div class="lowest-price">💰 Lowest: ${lowestPrice ? ₹${lowestPrice.toLocaleString()} : 'Loading...'}</div>
                    <div style="color:${product.siteColor}; font-weight:bold; margin:10px 0;">${product.site}</div>
                    <div>
                        <a href="${product.url || '#'}" class="btn ${product.site.toLowerCase()}" target="_blank">🛒 Buy ${product.site}</a>
                        <a href="https://wa.me/919812837279?text=Hi!%20${encodeURIComponent(product.title.slice(0,50))}%20₹${product.price || 'Best'}" 
                           class="btn btn-whatsapp" target="_blank">💬 COD</a>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('totalProducts').textContent = products.length;
        }

        // Live search + auto popular searches
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                // Auto-load popular searches
                const randomPopular = popularSearches[Math.floor(Math.random() * popularSearches.length)];
                await loadProducts(randomPopular);
                return;
            }

            const products = await fetchFromAllSites(query);
            allProducts = [...allProducts, ...products];
            displayProducts(products.slice(0, 20)); // Show top 20
            showComparison({amazon: [], flipkart: [], meesho: [], myntra: []}); // Update comparison
        });

        // Auto-load initial popular products
        async function loadProducts(query = 'smartphone') {
            const products = await fetchFromAllSites(query);
            allProducts = products;
            displayProducts(products.slice(0, 24));
            liveUpdateCount++;
            document.getElementById('liveUpdates').textContent = liveUpdateCount;
            document.getElementById('savings').textContent = '₹10,000+';
        }

        // Auto-refresh every 2 minutes
        setInterval(() => {
            const query = document.getElementById('searchInput').value || 'smartphone';
            loadProducts(query);
        }, 120000);

        // START - Load first popular products
        window.addEventListener('load', () => loadProducts('iphone'));
    </script>
</body>
</html>
